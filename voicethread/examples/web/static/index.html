<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentloom OpenAI Realtime WebRTC Sideband Spike</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; }
    button { margin: 0.25rem; padding: 0.5rem 0.75rem; }
    input { padding: 0.5rem; min-width: 24rem; }
    #log { margin-top: 1rem; padding: 1rem; background: #111; color: #eee; min-height: 20rem; white-space: pre-wrap; overflow-wrap: anywhere; }
    .status { margin: 0.75rem 0; font-weight: 600; }
    .note { padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem; background: #fafafa; }
  </style>
</head>
<body>
  <h1>Agentloom OpenAI Realtime WebRTC Sideband Spike</h1>
  <p class="note">
    Browser media goes directly to OpenAI over WebRTC using an ephemeral key. The Go server owns the API key,
    joins the same call by <code>call_id</code> over the Realtime sideband WebSocket, and sends the real
    instructions/tools via <code>session.update</code>.
  </p>

  <div>
    <button id="connect">Connect WebRTC</button>
    <button id="disconnect" disabled>Disconnect</button>
    <button id="cancel" disabled>Server Cancel</button>
  </div>
  <div>
    <input id="text" placeholder="Type a message over the WebRTC data channel" />
    <button id="sendText" disabled>Send Text</button>
  </div>
  <div class="status" id="status">disconnected</div>
  <audio id="remoteAudio" autoplay></audio>
  <div id="log"></div>

  <script src="/static/app.js"></script>
</body>
</html>
